<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>box model</title>
  <link rel="stylesheet" href="./common.css">
  <link rel="stylesheet" href="./260402_box-model.css">
</head>
<body>
  <input type="checkbox" name="box-size" id="content-size">
  <label for="content-size">CONTENT</label>
  <input type="checkbox" name="box-size" id="padding-size">
  <label for="padding-size">PADDING</label>
  <input type="checkbox" name="box-size" id="border-size">
  <label for="border-size">BORDER</label>
  <input type="checkbox" name="box-size" id="margin-size">
  <label for="margin-size">MARGIN</label>
  <input type="checkbox" name="box-size" id="bx-s-bdbx">
  <label for="bx-s-bdbx">BOX-SIZING: BORDER-BOX;</label>
  <div class="box-container">
    <span>CSS 박스 모델</span>
    <div class="box-margin"></div>
    <div class="box-border"></div>
    <div class="box-padding"></div>
    <div class="box-content"></div>
  </div>
</body>
</html>
